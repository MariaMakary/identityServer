services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: identitydb
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5431:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d identitydb"]
      interval: 5s
      timeout: 5s
      retries: 5

  identity-server:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "5166:5166"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__DefaultConnection: "Host=postgres;Port=5432;Database=identitydb;Username=admin;Password=${POSTGRES_PASSWORD}"
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      Serilog__SeqUrl: "http://seq:5341"
      FrontendUrl: "http://localhost:5173"
      CORS__Origins__0: "http://localhost:5173"
    depends_on:
      postgres:
        condition: service_healthy

  seq:
    image: datalust/seq:latest
    environment:
      ACCEPT_EULA: "Y"
      SEQ_FIRSTRUN_ADMINPASSWORD: ${SEQ_ADMIN_PASSWORD}
    ports:
      - "5341:5341"
      - "8081:80"

volumes:
  pgdata:
